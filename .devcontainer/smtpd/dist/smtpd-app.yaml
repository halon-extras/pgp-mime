  - data: "MIME-Version: 1.0\r\nMessage-ID: <b604dde3-12fb-11f1-b164-2bf370ae4941@se1-gles-sth1.inumbo.com>\r\
      \nDate: Thu, 26 Feb 2026 11:12:52 +0100\r\nFrom: <sender@example.org>\r\nTo:\
      \ <recipient@example.com>\r\nSubject: Hello World\r\nContent-Type: multipart/alternative;\r\
      \n boundary=\"b604e38c-12fb-11f1-b164-2bf370ae4941\"\r\n\r\n--b604e38c-12fb-11f1-b164-2bf370ae4941\r\
      \nContent-Type: text/plain; charset=utf-8\r\n\r\n*Hello World*\r\n--b604e38c-12fb-11f1-b164-2bf370ae4941\r\
